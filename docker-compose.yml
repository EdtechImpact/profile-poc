services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: profile_poc
      POSTGRES_USER: poc
      POSTGRES_PASSWORD: poc_local
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U poc -d profile_poc"]
      interval: 5s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/poc_local
      NEO4J_PLUGINS: '["graph-data-science"]'
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1G
      NEO4J_server_bolt_advertised__address: localhost:7687
      NEO4J_server_bolt_listen__address: 0.0.0.0:7687
      NEO4J_server_http_advertised__address: localhost:7474
      NEO4J_server_http_listen__address: 0.0.0.0:7474
    volumes:
      - neo4jdata:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "poc_local", "RETURN 1"]
      interval: 10s
      timeout: 10s
      retries: 5

volumes:
  pgdata:
  neo4jdata:
